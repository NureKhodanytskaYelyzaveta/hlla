<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Другий рівень</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 150px; font-family: monospace; }
        #result { margin-top: 10px; font-weight: bold; }
        .valid { color: green; }
        .invalid { color: red; }
    </style>
</head>
<body>
    <h2>Перевірка JSON</h2>
    <p>Вставте JSON текст нижче:</p>
    <textarea id="jsonInput" placeholder='{"name": "Test", "value": 123}'></textarea>
    <br>
    <button onclick="checkJSON()">Перевірити</button>
    
    <div id="result"></div>

    <script>
        function checkJSON() {
            const input = document.getElementById('jsonInput').value;
            const resultDiv = document.getElementById('result');
            
            try {
                const parsed = JSON.parse(input);
                
                resultDiv.innerText = "✅ Дійсний JSON";
                resultDiv.className = "valid";
                console.log("Об'єкт:", parsed);
            } catch (e) {
                resultDiv.innerText = "❌ Недійсний JSON: " + e.message;
                resultDiv.className = "invalid";
            }
        }
    </script>
</body>
</html>
